[build]
builder = "nixpacks"
buildCommand = "npm install"

[deploy]
startCommand = "node --require ts-node/register index.ts"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Force Node 20 and install Chromium + ffmpeg for Remotion
[build.nixpacksPlan.phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "ffmpeg",
  "nss",
  "atk",
  "cups",
  "libdrm",
  "gtk3",
  "mesa",
  "alsa-lib",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXrandr",
  "xorg.libXcursor"
]
